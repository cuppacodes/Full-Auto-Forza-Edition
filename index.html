<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FAFE – Full Auto Forza Edition</title>
<meta name="description" content="Choose the English or Traditional Chinese website for FAFE, the Forza Horizon 6 automation tool for Windows.">
<link rel="canonical" href="https://leoncrispybacon.github.io/Full-Auto-Forza-Edition/">
<link rel="alternate" hreflang="en" href="https://leoncrispybacon.github.io/Full-Auto-Forza-Edition/en/">
<link rel="alternate" hreflang="zh-Hant" href="https://leoncrispybacon.github.io/Full-Auto-Forza-Edition/zh-tw/">
<link rel="alternate" hreflang="x-default" href="https://leoncrispybacon.github.io/Full-Auto-Forza-Edition/">
<link rel="icon" type="image/png" href="assets/site/fafe-icon.png">
<script>
(function() {
  let savedLanguage = null;
  try {
    savedLanguage = localStorage.getItem('preferredLanguage');
  } catch (error) {
    // Fall back to browser-language detection when storage is unavailable.
  }

  const browserLanguage = navigator.language.toLowerCase();
  const lang = savedLanguage === 'zh-tw' || savedLanguage === 'en'
    ? savedLanguage
    : browserLanguage.startsWith('zh') ? 'zh-tw' : 'en';

  window.location.replace(lang + '/');
})();
</script>
<style>
  * { box-sizing: border-box; }
  body {
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    padding: 24px;
    background: #0f0f0f;
    color: #e0e0e0;
    font-family: "Segoe UI", "Microsoft JhengHei UI", sans-serif;
    text-align: center;
  }
  main { max-width: 520px; }
  img { width: 84px; height: 84px; border-radius: 18px; }
  h1 { margin: 18px 0 8px; }
  p { color: #94a3b8; }
  nav { display: flex; justify-content: center; gap: 12px; margin-top: 24px; }
  a {
    padding: 10px 18px;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>
<main>
  <img src="assets/site/fafe-icon.png" width="512" height="512" alt="FAFE">
  <h1>Full Auto Forza Edition</h1>
  <p>Redirecting to your preferred language…</p>
  <nav aria-label="Language selection">
    <a href="en/">English</a>
    <a href="zh-tw/" lang="zh-Hant">繁體中文</a>
  </nav>
</main>
</body>
</html>
